<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Number</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h2>Number Guessing Game</h2>
        <p>Try and guess a random number between 1 and 100</p>
        <p>You have 10 attempts to guess the right number</p>

        <form>
            <label for="inputNumber" id="number">Guess a Number</label>
            <input type="text" id="inputNumber">
            <input type="submit" value="Submit Guess" id="submit">
        </form>

        <div class="resultPara">
            <p>Previous Guesses: <span id="last_Guess"></span></p>
            <p>Guesses Remaining: <span id="remainingGuess"></span></p>
            <p id="lowOrHigh"></p>
            <p class="button"><h2 id= "newGame"></h2></p>
        </div>
    </div>


    <script src = "script.js"></script>
</body>
</html>
